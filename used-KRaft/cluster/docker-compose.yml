services:
  # =========================================================
  # 🟢 브로커 1번 (kafka-1)
  # =========================================================
  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-1
    ports:
      - "9092:9092" # 외부(Spring)에서 접속할 포트
    networks:
      - kafka-cluster-net
    environment:
      # [1] KRaft 모드 핵심 설정 - Node ID 지정
      KAFKA_NODE_ID: 1
      # 해당 서버가 가지는 Roles
      # 브로커 서버가 많을 경우 ROLE을 더 세분화 하여 저장한다.
      # ex) 3개의 브로커는 "controller"를 갖고 나머지 40대는 "broker"역할만 진행
      KAFKA_PROCESS_ROLES: "broker"
      # 💡 [클러스터 핵심] 컨트롤러 쿼럼(Quorum) 구성
      # 포맷: [Node_ID]@[Hostname]:[Port]
      #
      # - 고가용성: 3대의 컨트롤러 중 1대가 장애를 겪어도 과반수(2대) 합의를 통해 클러스터를 정상 유지합니다.
      # - 등록 조건: process.roles에 'controller' 역할이 부여된 노드만 이 목록에 명시할 수 있습니다.
      # - 공통 필수값: 투표권이 없는 순수 'broker' 노드 역시 컨트롤러의 위치를 알아야 하므로, 클러스터 내 모든 서버에 동일하게 선언되어야 합니다.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "4@kafka-controller-1:29093,5@kafka-controller-2:29093,6@kafka-controller-3:29093"

      # [2] 네트워크 / 통신 설정
      # 💡 [클러스터 핵심] 통신망을 2개로 분리합니다. (순수 broker는 CONTROLLER 통신망 불필요)
      # INTERNAL: 카프카 브로커들끼리 데이터를 복제할 때 쓰는 **내부 통신망**
      # EXTERNAL: Spring Boot 서버가 접속할 **외부 통신망**
      KAFKA_LISTENERS: "INTERNAL://kafka-1:29092,EXTERNAL://0.0.0.0:9092"
      # 남에게 알려줄 주소를 작성
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092"
      # 복제용 채널 리스너 지정 - 브로커들끼리 데이터를 주고받을(복제할) 때 어떤 리스너 지정
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      # 컨트롤러용 채널 - KRaft 컨트롤러들이 서로 상태를 공유할 때 사용할 리스너 이름을 지정
      # 🔍 broker 역할만 진행하더라도 해당 설정 필요 - broker가 controller에게 접속할 때 사용
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # 리스너 이름(사용자가 정의한 이름)과 실제 카프카가 이해하는 보안 프로토콜을 연결하는 지도입니다.
      # > "내가 INTERNAL이라고 부르는 리스너는 사실 PLAINTEXT(암호화 없음) 규약을 따를 거야"라고 정의하는 것입니다.
      # 🔍 CONTROLLER:PLAINTEXT - broker가 controller 접속 시 어떤 프로토콜인지 알기 위해 필요
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"

      # 존재하지 않는 토픽으로 메시지를 보낼 때, 브로커가 알아서 토픽을 만들지 여부를 결정
      # > false 일 경우 자동 생성 ❌
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      # [3] 저장소 및 클러스터 식별 설정
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      # 💡 [클러스터 핵심] 모든 브로커가 "같은 클러스터 ID"를 가져야 하나의 팀으로 묶입니다.
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2 # 최소 2대 이상 동기화되어야 정상으로 판단

    depends_on:
      kafka-controller-1:
        condition: service_healthy
      kafka-controller-2:
        condition: service_healthy
      kafka-controller-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================================================
  # 🟢 브로커 2번 (kafka-2)
  # =========================================================
  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-2
    ports:
      - "9093:9093" # 포트 충돌을 막기 위해 9093 사용
    networks:
      - kafka-cluster-net
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "4@kafka-controller-1:29093,5@kafka-controller-2:29093,6@kafka-controller-3:29093"

      KAFKA_LISTENERS: "INTERNAL://kafka-2:29092,EXTERNAL://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-2:29092,EXTERNAL://localhost:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

    depends_on:
      kafka-controller-1:
        condition: service_healthy
      kafka-controller-2:
        condition: service_healthy
      kafka-controller-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9093", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================================================
  # 🟢 브로커 3번 (kafka-3)
  # =========================================================
  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-3
    ports:
      - "9094:9094" # 포트 충돌을 막기 위해 9094 사용
    networks:
      - kafka-cluster-net
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "4@kafka-controller-1:29093,5@kafka-controller-2:29093,6@kafka-controller-3:29093"

      KAFKA_LISTENERS: "INTERNAL://kafka-3:29092,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka-3:29092,EXTERNAL://localhost:9094"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

    depends_on:
      kafka-controller-1:
        condition: service_healthy
      kafka-controller-2:
        condition: service_healthy
      kafka-controller-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9094", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================================================
  # 🔵 컨트롤러 1번 (kafka-controller-1)
  # - 순수 Controller 전용 노드
  # - 클라이언트(Producer/Consumer) 접속 불가 ❌
  # - 역할: 리더 선출, 메타데이터 관리, 브로커 장애 감지 (구 ZooKeeper 역할)
  # =========================================================
  kafka-controller-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-controller-1
    # 💡 외부 포트 노출 없음 - 클라이언트가 직접 접속할 일이 없음
    networks:
      - kafka-cluster-net
    environment:
      # 💡 브로커와 동일한 클러스터 ID를 가져야 같은 클러스터로 인식
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # 💡 브로커의 노드 아이디
      KAFKA_NODE_ID: 4
      # 순수 Controller 역할만 수행
      KAFKA_PROCESS_ROLES: "controller"
      # 💡 [클러스터 핵심] 컨트롤러 쿼럼(Quorum) 구성
      # - 3대의 컨트롤러 중 1대가 장애를 겪어도 과반수(2대) 합의를 통해 클러스터를 정상 유지합니다.
      # - 모든 노드(broker 포함)에 동일하게 선언되어야 합니다.
      KAFKA_CONTROLLER_QUORUM_VOTERS: "4@kafka-controller-1:29093,5@kafka-controller-2:29093,6@kafka-controller-3:29093"

      # 💡 순수 Controller는 CONTROLLER 리스너만 필요합니다.
      # INTERNAL, EXTERNAL 리스너 불필요 (클라이언트/브로커 데이터 통신 없음) - 설정할 경우 서버 기동 시 에러 발생함 (role : controller 하나 일 경우)
      # ADVERTISED_LISTENERS, INTER_BROKER_LISTENER_NAME 설정 불필요
      KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"

      # 💡 데이터 복제는 안하지만 Raft 합의 로그(메타데이터)는 디스크에 저장하므로 필요
      KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"

      # 💡 아래 3개 설정은 broker의 데이터 복제 관련 설정이므로 Controller에는 불필요
      # KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR         ❌
      # KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR ❌
      # KAFKA_TRANSACTION_STATE_LOG_MIN_ISR            ❌

    # 💡 순수 Controller는 kafka-topics 명령 사용 불가 (broker 기능 없음)
    #    대신 CONTROLLER 포트(29093)가 열려있는지로 health 체크
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29093 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================================================
  # 🔵 컨트롤러 2번 (kafka-controller-2)
  # =========================================================
  kafka-controller-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-controller-2
    networks:
      - kafka-cluster-net
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 5
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "4@kafka-controller-1:29093,5@kafka-controller-2:29093,6@kafka-controller-3:29093"

      KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"

      KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"


    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29093 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================================================
  # 🔵 컨트롤러 3번 (kafka-controller-3)
  # =========================================================
  kafka-controller-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-controller-3
    networks:
      - kafka-cluster-net
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 6
      KAFKA_PROCESS_ROLES: "controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "4@kafka-controller-1:29093,5@kafka-controller-2:29093,6@kafka-controller-3:29093"

      KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT"

      KAFKA_LOG_DIRS: "/tmp/kraft-controller-logs"


    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29093 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # =========================================================
  # 🟣 Kafka UI - 클러스터 상태 시각화 대시보드
  # =========================================================
  # - 파티션별 Leader/ISR 변화를 실시간 GUI로 확인 (장애 테스트 학습 필수)
  # - Consumer Group Lag, 메시지 내용 조회, 토픽 생성/삭제까지 GUI 제공
  # - 접속: http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080" # 호스트 8090 포트를 컨테이너 8080에 매핑
    networks:
      - kafka-cluster-net
    environment:
      # UI에 표시될 클러스터 이름 (구분용 라벨)
      KAFKA_CLUSTERS_0_NAME: local-kraft-cluster
      # 💡 핵심: UI 컨테이너는 Docker 내부망에서 접속하므로 INTERNAL 주소 사용
      #    (localhost:9092 쓰면 UI 컨테이너가 자기 자신을 찾아서 실패함)
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-1:29092,kafka-2:29092,kafka-3:29092"
      # 💡 [UI 설정] 런타임 환경에서 클러스터 설정을 동적으로 수정 허용
      # - true: UI 화면 내 'Config' 탭에서 브로커 설정이나 토픽 설정을 즉시 변경 가능합니다.
      # - false(기본값): UI는 읽기 전용(Read-only) 모드에 가까워지며, 설정 변경 기능이 비활성화됩니다.
      # - 주의: 운영 환경에서는 실수로 설정을 바꾸지 않도록 false로 두는 경우가 많습니다.
      DYNAMIC_CONFIG_ENABLED: "false"
      # 인증 관련 설정
      AUTH_TYPE: "LOGIN"
      SPRING_SECURITY_USER_NAME: "admin"
      SPRING_SECURITY_USER_PASSWORD: "123"

    # 💡 depends_on + condition: service_healthy
    # - 위에서 정의한 healthcheck가 통과해야 Kafka UI 기동
    # - 이 설정이 없으면 Kafka가 아직 준비 안 됐는데 UI가 먼저 떠서 연결 실패 로그 반복
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy


# 도커 컨테이너들이 서로 통신할 수 있도록 가상 네트워크 생성
networks:
  kafka-cluster-net:
    driver: bridge